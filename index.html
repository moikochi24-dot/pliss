<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tic Tac Tom mobile</title>
    <style>
        :root {
            --forest-green: #2d5a27;
            --wood-brown: #5d4037;
            --leaf-light: #a5d6a7;
            --sand-bg: #fdf5e6;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Hapus kotak biru saat klik di HP */
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                              url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            overflow: hidden; /* Mencegah scroll di HP */
        }

        h1 {
            font-size: 1.5rem;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            width: 90%;
            max-width: 400px;
        }

        select, button {
            flex: 1;
            padding: 12px;
            font-size: 0.9rem;
            border-radius: 12px;
            border: none;
            font-weight: bold;
        }

        select { background: white; color: #333; }
        button { background: var(--forest-green); color: white; box-shadow: 0 4px #1a3a18; }
        button:active { transform: translateY(2px); box-shadow: 0 2px #1a3a18; }

        .status {
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            font-size: 1.1rem;
            min-height: 40px;
            display: flex;
            align-items: center;
        }

        /* Papan Responsif: Berdasarkan ukuran terkecil antara lebar/tinggi layar */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 85vw;
            height: 85vw;
            max-width: 350px;
            max-height: 350px;
            background: rgba(93, 64, 55, 0.8);
            padding: 10px;
            border-radius: 15px;
            border: 4px solid var(--wood-brown);
        }

        .cell {
            background: var(--sand-bg);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .cell.taken { cursor: default; }
        .cell.winner { background: var(--leaf-light); }

        /* Animasi Muncul */
        .pop {
            animation: popIcon 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIcon {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>🦎 Tic Tac TOM </h1>

    <div class="controls">
        <select id="gameMode" onchange="resetGame()">
            <option value="pvp">👥 2 Pemain</option>
            <option value="pve">🤖 Lawan AI</option>
        </select>
        <button onclick="resetGame()">🔄 Ulang</button>
    </div>

    <div class="status" id="statusText">Giliran 🦎</div>

    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <script>
        const cells = document.querySelectorAll('.cell');
        const statusDisplay = document.getElementById('statusText');
        const modeSelect = document.getElementById('gameMode');
        
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "🦎";
        let gameActive = true;

        const winConditions = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];

        function handleCellClick(e) {
            const index = e.target.getAttribute('data-index');
            if (board[index] !== "" || !gameActive) return;

            makeMove(index);

            if (gameActive && modeSelect.value === 'pve' && currentPlayer === "🦎") {
                setTimeout(aiMove, 600);
            }
        }

        function makeMove(index) {
            board[index] = currentPlayer;
            const cell = cells[index];
            cell.innerText = currentPlayer;
            cell.classList.add('taken', 'pop');
            
            checkResult();
            
            if (gameActive) {
                currentPlayer = currentPlayer === "🦎" ? "🐊" : "🦎";
                statusDisplay.innerText = `Giliran ${currentPlayer}`;
            }
        }

        function aiMove() {
            let emptySlots = board.map((v, i) => v === "" ? i : null).filter(v => v !== null);
            if (emptySlots.length > 0) {
                const randomIdx = emptySlots[Math.floor(Math.random() * emptySlots.length)];
                makeMove(randomIdx);
            }
        }

        function checkResult() {
            let won = false;
            for (let condition of winConditions) {
                let [a, b, c] = condition;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    won = true;
                    condition.forEach(idx => cells[idx].classList.add('winner'));
                    break;
                }
            }

            if (won) {
                statusDisplay.innerText = `🎉 ${currentPlayer} Menang!`;
                gameActive = false;
            } else if (!board.includes("")) {
                statusDisplay.innerText = "🤝 Hasil Seri!";
                gameActive = false;
            }
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            gameActive = true;
            currentPlayer = "🦎";
            statusDisplay.innerText = "Giliran 🦎";
            cells.forEach(cell => {
                cell.innerText = "";
                cell.classList.remove('taken', 'pop', 'winner');
            });
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
    </script>
</body>
</html>
